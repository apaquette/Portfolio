name: Test (Reusable)

on:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      
      - name: Restore dependencies
        run: dotnet restore ./src/Portfolio
      
      - name: Build
        run: dotnet build ./src/Portfolio --configuration Release --no-restore
      
      - name: Run unit tests
        run: dotnet test Portfolio.sln --configuration Release --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Add tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate merged coverage report
        run: |
          reportgenerator \
            -reports:"**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Cobertura;TextSummary"
      
      - name: Evaluate coverage
        run: |
          sudo apt-get install -y xmlstarlet bc

          FILE="coverage-report/Cobertura.xml"

          if [ ! -f "$FILE" ]; then
            echo "ERROR: merged coverage file not found"
            find coverage-report || true
            exit 1
          fi

          RATE=$(xmlstarlet sel -t -v "string(//coverage/@line-rate)" "$FILE")

          if [ -z "$RATE" ]; then
            echo "ERROR: could not extract coverage rate"
            exit 1
          fi

          PERCENT=$(echo "$RATE * 100" | bc -l)

          echo "Coverage: $PERCENT%"

          THRESHOLD=90

          if (( $(echo "$PERCENT < $THRESHOLD" | bc -l) )); then
            echo "Coverage below threshold"
            exit 1
          fi
          